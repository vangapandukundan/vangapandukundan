name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: vangapandukundan
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#FF006E&color_dots=#06FFB4,#3A86FF,#8338EC,#222222
            dist/github-contribution-grid-snake-dark.svg?color_snake=#FF006E&color_dots=#06FFB4,#3A86FF,#8338EC,#111111

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
